# Rugby Rating Engine — Pondérations par poste (v3 Groupes LNR)
# Mode Groupes LNR : FRONT_ROW (Piliers+Talonneur) / BACK_ROW (Flankers+N°8)
# weight : importance du critère (somme ≈ 1.0 par poste)
# negative : true = un score bas est meilleur (pénalités, erreurs...)

FRONT_ROW:
  # Moyenne pondérée des anciens PROP + HOOKER
  penalties_per80:      {weight: 0.17, negative: true}
  ruck_arrivals_per80:  {weight: 0.13, negative: false}
  tackles_per80:        {weight: 0.12, negative: false}
  tackle_success_pct:   {weight: 0.10, negative: false}
  scrum_success_pct:    {weight: 0.11, negative: false}
